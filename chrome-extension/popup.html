<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PrYoPort</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="logo">⚡</span>
      <div>
        <h1>PrYoPort</h1>
        <span class="tagline">Smart Inbox Engine</span>
      </div>
    </div>
    <div class="header-right">
      <div id="urgentBadge" class="urgent-badge hidden">
        <span id="urgentCount">0</span> urgent
      </div>
    </div>
  </div>

  <!-- STATUS + ACTIONS -->
  <div class="card status-card">
    <div class="status-row">
      <p id="status" class="status-text">⏳ Checking...</p>
      <button id="login" class="btn primary small">Login</button>
    </div>
    <button id="syncBtn" class="btn accent full-width">
      <span id="syncLabel">🔄 Sync Inbox</span>
    </button>
  </div>

  <!-- PRIORITY SENDER RULE -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🎯</span>
      <h3>Priority Sender</h3>
    </div>
    <input type="text" id="emailInput" placeholder="sender@company.com" class="input">
    <div class="row-gap">
      <select id="prioritySelect" class="select">
        <option value="high">🔥 High Priority</option>
        <option value="low">🧊 Low Priority</option>
      </select>
      <button id="savePriority" class="btn primary small">Save</button>
    </div>
  </div>

  <!-- NOTIFICATIONS PANEL -->
  <div class="card notif-card">
    <div class="card-header">
      <span class="card-icon">🔔</span>
      <h3>Notifications</h3>
      <button id="clearBtn" class="btn ghost tiny">Clear all</button>
    </div>

    <div id="section-high" class="priority-section hidden">
      <div class="section-label high"><span class="dot"></span>HIGH PRIORITY</div>
      <div id="list-high" class="notif-list"></div>
    </div>

    <div id="section-medium" class="priority-section hidden">
      <div class="section-label medium"><span class="dot"></span>MEDIUM</div>
      <div id="list-medium" class="notif-list"></div>
    </div>

    <div id="emptyState" class="empty-state">
      <span class="empty-icon">📭</span>
      <p>No priority emails yet</p>
      <small>Sync your inbox to get started</small>
    </div>
  </div>

  <div class="footer">AI-powered email decisions · PrYoPort</div>

</div>
<script src="popup.js"></script>
</body>
</html>
